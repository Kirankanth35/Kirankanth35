<svg viewBox="0 0 1200 250" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Timeline from 2020 to now">
  <style>
    :root { --bone: #444444; --rule: #C0C0C0; --muted: #888888; --dim: #AAAAAA; --accent: #555555; --ghost: #CCCCCC; }
    @media (prefers-color-scheme: dark) { :root { --bone: #DDDDDD; --rule: #444444; --muted: #777777; --dim: #666666; --accent: #AAAAAA; --ghost: #2A2A2A; } }
    .mono { font-family: ui-monospace, "SFMono-Regular", "SF Mono", Menlo, Consolas, "Liberation Mono", monospace; }
    .rise { opacity: 0; animation: rise .7s cubic-bezier(.2,.7,.2,1) forwards; }
    @keyframes rise { from { opacity:0;transform:translateY(8px); } to { opacity:1;transform:translateY(0); } }
    .fade { opacity: 0; animation: fade .7s ease forwards; }
    @keyframes fade { to { opacity: 1; } }
    .a1{animation-delay:0.1s} .a2{animation-delay:0.2s} .a3{animation-delay:0.35s} .a4{animation-delay:0.5s} .a5{animation-delay:0.65s} .a6{animation-delay:0.8s} .a7{animation-delay:0.95s} .a8{animation-delay:1.1s} .a9{animation-delay:1.25s} .a10{animation-delay:1.4s}
    .axis { stroke: var(--rule); stroke-width: 1; stroke-dasharray: 1110; stroke-dashoffset: 1110; animation: dax 2.4s cubic-bezier(.6,0,.2,1) forwards; }
    @keyframes dax { to { stroke-dashoffset: 0; } }
    .m { opacity: 0; animation: rise .7s cubic-bezier(.2,.7,.2,1) forwards; }
.m1{animation-delay:0.75s} .m2{animation-delay:1.10s} .m3{animation-delay:1.45s} .m4{animation-delay:1.80s} .m5{animation-delay:2.15s} .m6{animation-delay:2.50s}
    .pulse { animation: pl 2.6s ease-in-out infinite; }
    @keyframes pl { 0%,100%{opacity:1} 50%{opacity:.35} }
    .ring { animation: rg 2.6s ease-out infinite; transform-origin: 1060px 125px; }
    @keyframes rg { 0%{transform:scale(.4);opacity:.8} 80%,100%{transform:scale(3);opacity:0} }
    @media (prefers-reduced-motion: reduce){.axis,.m,.pulse,.ring{animation:none}.axis{stroke-dashoffset:0}.m{opacity:1}.ring{opacity:0}}
    @media (prefers-reduced-motion: reduce) { .rise,.fade,.draw { animation: none; } .rise,.fade { opacity: 1; } .draw { stroke-dashoffset: 0; } }
  </style>
  <line x1="48" y1="40" x2="1152" y2="40" stroke="var(--rule)"/>
  <text fill="var(--muted)" class="mono" x="48" y="28" font-size="11" letter-spacing="3.5">THE ROUTE SO FAR</text>
  <text fill="var(--muted)" class="mono" x="1152" y="28" font-size="11" letter-spacing="3.5" text-anchor="end">FIG. 03</text>

  <line class="axis" x1="48" y1="125" x2="1158" y2="125"/>

  <g class="m m1">
    <circle cx="120" cy="125" r="4" fill="var(--bone)"/>
    <line x1="120" y1="121" x2="120" y2="96" stroke="var(--rule)"/>
    <text fill="var(--accent)" class="mono" x="120" y="74" font-size="11" letter-spacing="2" text-anchor="middle">2020</text>
    <text fill="var(--bone)" class="mono" x="120" y="90" font-size="10.5" letter-spacing="1" text-anchor="middle">B.E. Computer Science &#183; KL University</text>
  </g>
  <g class="m m2">
    <circle cx="340" cy="125" r="4" fill="var(--bone)"/>
    <line x1="340" y1="129" x2="340" y2="154" stroke="var(--rule)"/>
    <text fill="var(--accent)" class="mono" x="340" y="172" font-size="11" letter-spacing="2" text-anchor="middle">2022</text>
    <text fill="var(--bone)" class="mono" x="340" y="188" font-size="10.5" letter-spacing="1" text-anchor="middle">Data Analytics Intern &#183; AICTE</text>
  </g>
  <g class="m m3">
    <circle cx="560" cy="125" r="4" fill="var(--bone)"/>
    <line x1="560" y1="121" x2="560" y2="96" stroke="var(--rule)"/>
    <text fill="var(--accent)" class="mono" x="560" y="74" font-size="11" letter-spacing="2" text-anchor="middle">2024</text>
    <text fill="var(--bone)" class="mono" x="560" y="90" font-size="10.5" letter-spacing="1" text-anchor="middle">MS Business Analytics &#183; CSUN</text>
  </g>
  <g class="m m4">
    <circle cx="780" cy="125" r="4" fill="var(--bone)"/>
    <line x1="780" y1="129" x2="780" y2="154" stroke="var(--rule)"/>
    <text fill="var(--accent)" class="mono" x="780" y="172" font-size="11" letter-spacing="2" text-anchor="middle">2026</text>
    <text fill="var(--bone)" class="mono" x="780" y="188" font-size="10.5" letter-spacing="1" text-anchor="middle">capstone &#183; influencer engagement study</text>
  </g>
  <g class="m m5">
    <circle cx="940" cy="125" r="4" fill="var(--bone)"/>
    <line x1="940" y1="121" x2="940" y2="96" stroke="var(--rule)"/>
    <text fill="var(--accent)" class="mono" x="940" y="74" font-size="11" letter-spacing="2" text-anchor="middle">2026</text>
    <text fill="var(--bone)" class="mono" x="940" y="90" font-size="10.5" letter-spacing="1" text-anchor="middle">FAFSA A/B testing experiment</text>
  </g>

  <g class="m m6">
    <circle class="ring" cx="1060" cy="125" r="5" stroke="var(--accent)" stroke-width="1" fill="none"/>
    <circle class="pulse" cx="1060" cy="125" r="4" fill="var(--accent)"/>
    <line x1="1060" y1="129" x2="1060" y2="154" stroke="var(--rule)"/>
    <text fill="var(--accent)" class="mono" x="1060" y="172" font-size="11" letter-spacing="2" text-anchor="middle">NOW</text>
    <text fill="var(--bone)" class="mono" x="1060" y="188" font-size="10.5" letter-spacing="1" text-anchor="middle">open to analyst roles</text>
  </g>
</svg>