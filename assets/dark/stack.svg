<svg viewBox="0 0 1000 238" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Stack — languages, BI, statistics, cloud">
  <style>
    :root { --bone: #444444; --rule: #C0C0C0; --muted: #888888; --dim: #AAAAAA; --accent: #555555; --ghost: #CCCCCC; }
    @media (prefers-color-scheme: dark) { :root { --bone: #DDDDDD; --rule: #444444; --muted: #777777; --dim: #666666; --accent: #AAAAAA; --ghost: #2A2A2A; } }
    .mono { font-family: ui-monospace, "SFMono-Regular", "SF Mono", Menlo, Consolas, "Liberation Mono", monospace; }
    .rise { opacity: 0; animation: rise .7s cubic-bezier(.2,.7,.2,1) forwards; }
    @keyframes rise { from { opacity:0;transform:translateY(8px); } to { opacity:1;transform:translateY(0); } }
    .fade { opacity: 0; animation: fade .7s ease forwards; }
    @keyframes fade { to { opacity: 1; } }
    .a1{animation-delay:0.1s} .a2{animation-delay:0.2s} .a3{animation-delay:0.35s} .a4{animation-delay:0.5s} .a5{animation-delay:0.65s} .a6{animation-delay:0.8s} .a7{animation-delay:0.95s} .a8{animation-delay:1.1s} .a9{animation-delay:1.25s} .a10{animation-delay:1.4s}
    .s1{animation-delay:0.1s} .s2{animation-delay:0.2s} .s3{animation-delay:0.3s} .s4{animation-delay:0.4s} .s5{animation-delay:0.5s} .s6{animation-delay:0.6s} .s7{animation-delay:0.7s}
    @media (prefers-reduced-motion: reduce) { .rise,.fade,.draw { animation: none; } .rise,.fade { opacity: 1; } .draw { stroke-dashoffset: 0; } }
  </style>
  <line x1="164" y1="8" x2="164" y2="230" stroke="var(--rule)" stroke-width="1" opacity=".4"/>

  <text class="mono rise s1" x="48" y="32" font-size="12" fill="var(--muted)" letter-spacing="2">LANGUAGES</text>
  <text class="mono rise s1" x="180" y="32" font-size="15" fill="var(--bone)">Python &#183; SQL &#183; R</text>

  <text class="mono rise s2" x="48" y="64" font-size="12" fill="var(--muted)" letter-spacing="2">BI &amp; VIZ</text>
  <text class="mono rise s2" x="180" y="64" font-size="15" fill="var(--bone)">Tableau &#183; Power BI &#183; Excel &#183; dashboard design</text>

  <text class="mono rise s3" x="48" y="96" font-size="12" fill="var(--muted)" letter-spacing="2">STATISTICS</text>
  <text class="mono rise s3" x="180" y="96" font-size="15" fill="var(--bone)">regression &#183; mediation &#183; moderation &#183; hypothesis testing</text>

  <text class="mono rise s4" x="48" y="128" font-size="12" fill="var(--muted)" letter-spacing="2">EXPERIMENTS</text>
  <text class="mono rise s4" x="180" y="128" font-size="15" fill="var(--bone)">A/B testing &#183; causal inference &#183; power analysis</text>

  <text class="mono rise s5" x="48" y="160" font-size="12" fill="var(--muted)" letter-spacing="2">DATA</text>
  <text class="mono rise s5" x="180" y="160" font-size="15" fill="var(--bone)">MySQL &#183; data cleaning &#183; EDA &#183; feature engineering</text>

  <text class="mono rise s6" x="48" y="192" font-size="12" fill="var(--muted)" letter-spacing="2">CLOUD</text>
  <text class="mono rise s6" x="180" y="192" font-size="15" fill="var(--bone)">AWS (&#215;3 certified) &#183; Azure</text>

  <text class="mono rise s7" x="48" y="224" font-size="12" fill="var(--muted)" letter-spacing="2">PROCESS</text>
  <text class="mono rise s7" x="180" y="224" font-size="15" fill="var(--bone)">requirements gathering &#183; gap analysis &#183; UAT &#183; Agile</text>
</svg>